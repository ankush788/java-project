spring.application.name=api-gateway-service
server.port=8080
spring.main.web-application-type=reactive

# JWT Configuration
jwt.secret=q83JfL9k2Jd8sK3l9Kf7sP2lK8s9dJ3lK2l8sJf9sL0=
jwt.expiration=900000

# Redis Configuration
redis.host=redis
redis.port=6379
redis.password=

# Spring Cloud Gateway Configuration
spring.cloud.gateway.discovery.locator.enabled=false
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# Downstream service URLs
# Local defaults work when the gateway runs from the IDE on the host machine.
# Override with Docker hostnames when running the gateway inside Docker.
services.auth.url=${AUTH_SERVICE_URL:http://localhost:8081}
services.user-management.url=${USER_MANAGEMENT_SERVICE_URL:http://localhost:8083}
services.bug-triage.url=${BUG_TRIAGE_SERVICE_URL:http://localhost:8082}

# Logging Configuration
logging.level.root=INFO
logging.level.com.apigateway=DEBUG
logging.level.org.springframework.cloud.gateway=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Connection Timeouts
spring.cloud.gateway.httpclient.connect-timeout=5000
spring.cloud.gateway.httpclient.response-timeout=10000
