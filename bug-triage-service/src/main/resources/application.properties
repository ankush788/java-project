spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:mypassword}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
#this is Spring Boot Actuator  tell which api of it you want(expose)
management.endpoints.web.exposure.include=health   
#this mean it show full details only when you authorize. not authorize (show only "up" , "down")
management.endpoint.health.show-details=when-authorized

# Redis Configuration
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:myredispassword}
spring.data.redis.database=1
spring.data.redis.timeout=60000ms
spring.data.redis.jedis.pool.max-active=8
spring.data.redis.jedis.pool.max-idle=8
spring.data.redis.jedis.pool.min-idle=0
spring.data.redis.jedis.pool.max-wait=2000ms

#running port
spring.application.name=BUG-TRIAGE-SERVICE
server.port=8082

#eureka
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
# Current microservice ko Eureka server me register karo
eureka.client.register-with-eureka=true
# Eureka se dusri registered services ki list fetch karo
eureka.client.fetch-registry=true
# Service registration me hostname ki jagah IP address use karo
eureka.instance.prefer-ip-address=true
